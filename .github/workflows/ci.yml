name: CI/CD - Cofre ESP32

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

# Garante que pushes consecutivos no mesmo branch nao fiquem em fila.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_test:
    name: Build firmware e simulacao Wokwi
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Build da imagem Docker (ESP-IDF + mklittlefs)
        run: docker build -t esp32-builder -f Dockerfile .

      - name: Gerar fs.bin a partir de src/
        run: |
          docker run --name esp32-fs-builder esp32-builder /bin/bash
          docker cp esp32-fs-builder:/fs.bin .

      - name: Simulacao Wokwi (boot do firmware)
        uses: wokwi/wokwi-ci-action@v1
        with:
          # Aceita os dois nomes de secret: WOKWI_API_KEY e' o documentado
          # no enunciado do recrutador, WOKWI_CLI_TOKEN e' o nome usado
          # no template original e na documentacao oficial da action.
          token: ${{ secrets.WOKWI_API_KEY || secrets.WOKWI_CLI_TOKEN }}
          path: /
          timeout: 30000
          expect_text: 'Cofre iniciado'

      - name: Upload do fs.bin como artifact
        uses: actions/upload-artifact@v4
        with:
          name: fs-bin-${{ github.sha }}
          path: fs.bin
          retention-days: 7

  release:
    name: Release em main
    needs: build_and_test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Baixar fs.bin do job anterior
        uses: actions/download-artifact@v4
        with:
          name: fs-bin-${{ github.sha }}

      - name: Calcular tag de release
        id: version
        run: echo "tag=v$(date -u +%Y.%m.%d)-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Publicar release com fs.bin
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Cofre ESP32 ${{ steps.version.outputs.tag }}
          files: fs.bin
          generate_release_notes: true
